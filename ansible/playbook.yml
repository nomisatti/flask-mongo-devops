- name: Setup Pakcages on Server
  hosts: webservers
  become: true

  tasks:
    - name: Install Docker
      apt:
        name: docker.io
        state: present
        update_cache: true

    - name: Install Docker compose
      apt:
        name: docker-compose
        state: latest

    - name: Add Ubuntu User to docker
      user:
        name: ubuntu
        groups: docker
        append: true