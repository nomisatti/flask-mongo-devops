name: Complete CI/CD Pipeline - Deploy App to Aws Server

on:
    push:
        branches:
            - master

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
        -   name: checkout code
            uses: actions/checkout@v4

        -   name: connect to AWS via ssh
            uses: appleboy/ssh-action@v1.0.3
            with:
                host: ${{secrets.EC2_Host}}
                username: ${{secrets.EC2_Username}}
                key: ${{secrets.EC2_Key}}

                script: |
                    cd /home/ubuntu
                    if [ -d "/flask-mongo-devops" ]; then
                        cd /flask-mongo-devops && git pull
                    else
                        git clone https://github.com/nomisatti/flask-mongo-devops.git
                        cd flask-mongo-devops
                    fi
                    echo "${{secrets.ENV_FILE}}" > .env
                    sudo docker compose down
                    sudo docker compose up --build -d

