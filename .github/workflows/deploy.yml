name: Complete CI/CD Pipeline - Deploy App to Aws Server

on:
    push:
        branches:
            - master

jobs:
    deploy:
        runs-on: ubuntu-latest
        env:
            REPO_NAME: ${{github.event.repository.name}}
            REPO_URL: ${{github.server_url}}/${{github.repository}}
            DOCKER_IMAGE: ${{secrets.DOCKERHUB_USERNAME}}/${{github.event.repository.name}}:latest


        steps:
        -   name: checkout code
            uses: actions/checkout@v4
        
        -   name: Login To Docker hub
            uses: docker/login-action@v4
            with:
                username: ${{secrets.DOCKERHUB_USERNAME}}
                password: ${{secrets.DOCKERHUB_TOKEN}}

        -   name: Push Code to DockerHub
            uses: docker/build-push-action@v6
            with:
                context: ./app
                push: true
                tags: ${{ env.DOCKER_IMAGE}} 
        
        -   name: connect to AWS via ssh
            uses: appleboy/ssh-action@v1.0.3
            with:
                host: ${{secrets.EC2_Host}}
                username: ${{secrets.EC2_Username}}
                key: ${{secrets.EC2_Key}}

                script: |
                   
                    cd /home/ubuntu
                    if [ -d "${{ env.REPO_NAME}}" ]; then
                        #cd /flask-mongo-devops && git pull
                        cd ${{ env.REPO_NAME}} && git pull
                    else
                        #git clone https://github.com/nomisatti/flask-mongo-devops.
                        git clone ${{ env.REPO_URL}}

                        #cd flask-mongo-devops
                        cd ${{ env.REPO_NAME}}
                    fi
                    echo "${{secrets.ENV_FILE}}" > .env
                    sudo docker compose down
                    sudo docker compose up -d

